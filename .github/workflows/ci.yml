name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    env:
      ENVIRONMENT: TESTING
      SECRET_KEY: ci-test-secret-key
      DEBUG: "False"
      GEMINI_ENABLED: "False"

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Poetry
        run: pip install poetry

      - name: Install dependencies
        run: poetry install --no-interaction --no-ansi

      - name: Run Django tests
        run: poetry run python manage.py test services.tests core.tests
